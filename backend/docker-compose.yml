services:
    pgsql:
        image: pgvector/pgvector:pg17
        restart: unless-stopped
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: agent1o1
            POSTGRES_USER: agent1o1
            POSTGRES_PASSWORD: secret
        volumes:
            - pgsql-data:/var/lib/postgresql/data
        healthcheck:
            test: [ 'CMD-SHELL', 'pg_isready -U agent1o1' ]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis-data:/data
        healthcheck:
            test: [ 'CMD', 'redis-cli', 'ping' ]
            interval: 5s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio:latest
        restart: unless-stopped
        ports:
            - '9000:9000'
            - '9001:9001'
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        volumes:
            - minio-data:/data
        command: server /data --console-address ":9001"
        healthcheck:
            test: [ 'CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live' ]
            interval: 30s
            timeout: 20s
            retries: 3

volumes:
    pgsql-data:
    redis-data:
    minio-data:
